# UI Test Configuration
base.url=https://test.com

# Browser Configuration
# Supported browsers: chrome (default), firefox, safari, edge
browser=chrome

# Headless Mode Configuration
# Set to true for CI/CD pipelines (default)
# Set to false for local debugging with visible browser
headless=true

# API Test Configuration
api.base.url=https://test.com/api

# Timeout Configuration (in seconds)
timeout.explicit=10
timeout.implicit=5
